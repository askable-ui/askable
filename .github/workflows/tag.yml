name: tag / auto

# Detects a version bump in packages/core/package.json on main, pushes a
# git tag, then dispatches publish_release.yml.
#
# NOTE: Tags pushed by GITHUB_TOKEN do NOT trigger other workflows (GitHub
# security measure). We explicitly dispatch publish_release.yml instead.

on:
  push:
    branches: [main]
    paths:
      - "packages/core/package.json"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (e.g. 0.3.1) — leave blank to read from packages/core/package.json"
        required: false

permissions:
  contents: write
  actions: write # needed to dispatch publish_release.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./packages/core/package.json').version")
            PREVIOUS_VERSION=$(git show HEAD~1:packages/core/package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
            if [ "$VERSION" = "$PREVIOUS_VERSION" ]; then
              echo "Version is still $VERSION; skipping release dispatch."
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push git tag
        id: tag
        if: steps.version.outputs.changed == 'true'
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${TAG_VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; skipping release dispatch."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger publish workflow
        if: steps.version.outputs.changed == 'true' && steps.tag.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh workflow run publish_release.yml \
            -f tag="v${TAG_VERSION}" \
            --ref "v${TAG_VERSION}"

      - name: Trigger GitHub Release
        if: steps.version.outputs.changed == 'true' && steps.tag.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh workflow run release.yml \
            -f tag="v${TAG_VERSION}" \
            --ref main
