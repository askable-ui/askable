<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f12"/>
      <stop offset="100%" stop-color="#111317"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d0f12" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#center-glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="60" cy="60" r="3" fill="rgba(99,102,241,0.4)"/>
  <circle cx="1220" cy="60" r="3" fill="rgba(99,102,241,0.4)"/>
  <circle cx="60" cy="580" r="3" fill="rgba(99,102,241,0.4)"/>
  <circle cx="1220" cy="580" r="3" fill="rgba(99,102,241,0.4)"/>

  <!-- Top border line -->
  <rect x="60" y="56" width="200" height="1" fill="rgba(255,255,255,0.08)"/>
  <rect x="1020" y="56" width="200" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Star/logo icon -->
  <text x="640" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="url(#accent-glow)" text-anchor="middle" filter="url(#glow)">✦</text>

  <!-- Main title -->
  <text x="640" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="88" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-3">askable-ui</text>

  <!-- Tagline -->
  <text x="640" y="408" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="0.5">UI context your AI can actually use</text>

  <!-- Pills row -->
  <g transform="translate(640, 468)">
    <!-- react pill -->
    <rect x="-310" y="0" width="88" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="-266" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle">React</text>

    <!-- vue pill -->
    <rect x="-208" y="0" width="72" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="-172" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle">Vue</text>

    <!-- svelte pill -->
    <rect x="-122" y="0" width="88" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="-78" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle">Svelte</text>

    <!-- solid pill -->
    <rect x="-20" y="0" width="80" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="20" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle">Solid</text>

    <!-- angular pill -->
    <rect x="74" y="0" width="96" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="122" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle">Angular</text>

    <!-- mcp pill -->
    <rect x="184" y="0" width="72" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="220" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)" text-anchor="middle">MCP</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="564" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">askable-ui.com</text>
</svg>
